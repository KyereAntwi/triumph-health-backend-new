name: Development CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

env:
  DOTNET_VERSION: "10.0.x"
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/triumph-healthms
  
jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .Net
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      
      - name: Restore dependencies
        run: dotnet restore Triumph.HealthMs.sln
        
      - name: Build
        run: dotnet build tests/Triumph.HealthMs.UnitTests/Triumph.HealthMs.UnitTests.csproj --no-restore
      
      - name: Run Tests
        run: dotnet test tests/Triumph.HealthMs.UnitTests/Triumph.HealthMs.UnitTests.csproj --no-build --verbosity normal --results-directory ./test-results --logger "trx;LogFileName=test_results.trx"
        continue-on-error: false
      
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: ./test-results/test_results.trx
  
    build-and-push:
      name: Build and Push Docker Image
      runs-on: Ubuntu-latest
      needs: test
      steps:
        - uses: actions/checkout@v4
        
        - name: Set up Docker Buildx 
          uses: docker/setup-buildx-action@v3
        
        - name: Log in to Docker Hub
          uses: docker/login-action@v3
          with:
            username: ${{ secrets.DOCKER_USERNAME }}
            password: ${{ secrets.DOCKER_PASSWORD }}
            
        - name: Extract short SHA for tagging
          id: vars
          run: echo "SHORT_SHA=$(echo ${GITHUB_SHA} | cut -c1-7)" >> $GITHUB_ENV
        
        - name: Build and Push Docker Image
          uses: docker/build-push-action@v6
          with:
            context: .
            file: src/Triumph.HealthMs.Host/Dockerfile
            push: true
            tags: |
              ${{ env.DOCKER_IMAGE }}:latest
              ${{ env.DOCKER_IMAGE }}:${{ env.SHORT_SHA }}
            cache-from: type=registry,ref=${{ env.DOCKER_IMAGE }}:latest
            cache-to: type=registry,ref=${{ env.DOCKER_IMAGE }}:latest,mode=max