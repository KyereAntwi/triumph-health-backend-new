name: Development CD Pipeline

on:
  workflow_dispatch:

env:
  DOTNET_VERSION: "10.0.x"
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/triumph-healthms
  
jobs:
  deploy-qa:
    name: Deploy to QA (Manual Trigger)
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Check Docker Image
        run: |
          echo "Checking if Docker image ${{ env.DOCKER_IMAGE }}:latest exists..."
          if ! docker pull ${{ env.DOCKER_IMAGE }}:latest --quiet; then
            echo "❌ Docker image not found. Please ensure CI pipeline has completed successfully."
            exit 1
          else
            echo "✅ Docker image found and pulled successfully"
          fi
        
      - name: Deploy to CloudClusters QA
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.QA_SERVER_HOST }}
          username: ${{ secrets.QA_SERVER_USER }}
          password: ${{ secrets.QA_SERVER_PASSWORD }}
          port: ${{ secrets.QA_SERVER_PORT }}
          script: |
            # Check what's using port 8080 and clean it up
            echo "Checking for processes using port 8080..."
            PORT_8080_PID=$(lsof -ti:8080 2>/dev/null || echo "")
            if [ -n "$PORT_8080_PID" ]; then
              echo "Found process(es) using port 8080: $PORT_8080_PID"
              echo "Killing process(es)..."
              kill -9 $PORT_8080_PID 2>/dev/null || true
              sleep 2
            fi
            
            # Stop and remove existing container if it exists
            echo "Stopping existing triumph-healthms-qa container..."
            docker stop triumph-healthms-qa || true
            docker rm triumph-healthms-qa || true
            
            # Also check for any other containers that might be using port 8080
            echo "Checking for other containers using port 8080..."
            CONFLICTING_CONTAINERS=$(docker ps -a --filter "publish=8080" --format "{{.Names}}" 2>/dev/null || echo "")
            if [ -n "$CONFLICTING_CONTAINERS" ]; then
              echo "Found containers using port 8080: $CONFLICTING_CONTAINERS"
              for container in $CONFLICTING_CONTAINERS; do
                echo "Stopping and removing container: $container"
                docker stop $container || true
                docker rm $container || true
              done
            fi
            
            # Wait a moment for cleanup
            sleep 3
            
            # Run the new container with env vars
            echo "Starting new container..."
            docker run -d \
              --name triumph-healthms-qa \
              --restart unless-stopped \
              -p 8080:8080 \
              -e ASPNETCORE_ENVIRONMENT=Staging \
              -e "ConnectionStrings__DefaultConnection=${{ secrets.QA_DB_CONNECTION_STRING }}" \
              -e "ConnectionStrings__Redis=${{ secrets.QA_REDIS_CONNECTION_STRING }}" \
              -e "RabbitMQ__HostName=${{ secrets.QA_RABBITMQ_HOST }}" \
              -e "RabbitMQ__UserName=${{ secrets.QA_RABBITMQ_USERNAME }}" \
              -e "RabbitMQ__Password=${{ secrets.QA_RABBITMQ_PASSWORD }}" \
              -e "AuthServer__Authority=${{ secrets.QA_AUTH_SERVER_URL }}" \
              -e "AuthServer__ClientId=${{ secrets.QA_AUTH_SERVER_CLIENT_ID }}" \
              -e "AuthServer__ClientSecret=${{ secrets.QA_AUTH_SERVER_CLIENT_SECRET }}" \
              -e "AuthServer__Scope=${{ secrets.QA_AUTH_SERVER_SCOPE }}" \
              -e "AuthServer__Audience=${{ secrets.QA_AUTH_SERVER_AUDIENCE }}" \
              -e "AuthServer__AuthorizationUrl=${{ secrets.QA_AUTH_SERVER_AUTHORIZATION_URL }}" \
              -e "AuthServer__TokenUrl=${{ secrets.QA_AUTH_SERVER_TOKEN_URL }}" \
              -e "Sentry__Dsn=${{ secrets.QA_SENTRY_DSN }}" \
              ${{ env.DOCKER_IMAGE }}:latest
            
            echo "Deployment completed successfully"
            
            # Verify the container is running
            echo "Verifying deployment..."
            sleep 5
            if docker ps | grep -q triumph-healthms-qa; then
              echo "✅ Container triumph-healthms-qa is running successfully"
              CONTAINER_IP=$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' triumph-healthms-qa 2>/dev/null || echo "unknown")
              echo "Container IP: $CONTAINER_IP"
            else
              echo "❌ Container triumph-healthms-qa failed to start"
              echo "Checking container logs:"
              docker logs triumph-healthms-qa 2>/dev/null || echo "No logs available"
              exit 1
            fi
